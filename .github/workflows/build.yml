name: Build

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: Build (${{ matrix.rid }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows ────────────────────────────────────────────
          - os: windows-latest
            rid: win-x64
          - os: windows-latest
            rid: win-x86
          - os: windows-latest
            rid: win-arm64
          # ── Linux ──────────────────────────────────────────────
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-latest
            rid: linux-musl-x64
          - os: ubuntu-latest
            rid: linux-arm64
          - os: ubuntu-latest
            rid: linux-musl-arm64
          # ── macOS ──────────────────────────────────────────────
          - os: macos-latest
            rid: osx-x64
          - os: macos-latest
            rid: osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 7
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Publish
        run: >
          dotnet publish -c Release
          -r ${{ matrix.rid }}
          --self-contained=true
          -p:PublishSingleFile=true
          -p:PublishTrimmed=false
          -p:PublishReadyToRun=true
          -p:AppEnableTraceLogging=false
          -o publish/${{ matrix.rid }}

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path publish/${{ matrix.rid }}/* -DestinationPath SocksToVpn-${{ matrix.rid }}.zip

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: zip -j SocksToVpn-${{ matrix.rid }}.zip publish/${{ matrix.rid }}/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SocksToVpn-${{ matrix.rid }}
          path: SocksToVpn-${{ matrix.rid }}.zip
          if-no-files-found: error

  # ── GitHub Release (only on v* tags) ───────────────────────────
  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
